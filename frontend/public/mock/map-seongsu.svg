<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" role="img" aria-label="Mock location map">
  <rect width="640" height="340" fill="#eef3ee"/>
  <!-- park / green block -->
  <path d="M0 180 Q120 120 260 170 T560 150 L640 170 L640 340 L0 340 Z" fill="#cfe6cf"/>
  <!-- water -->
  <rect x="380" y="20" width="260" height="70" rx="20" fill="#bcd8ea"/>
  <!-- roads -->
  <line x1="0" y1="120" x2="640" y2="150" stroke="#ffffff" stroke-width="10"/>
  <line x1="220" y1="0" x2="260" y2="340" stroke="#ffffff" stroke-width="10"/>
  <line x1="430" y1="0" x2="470" y2="340" stroke="#f4d58a" stroke-width="8"/>
  <!-- blocks -->
  <rect x="40" y="40" width="120" height="60" rx="6" fill="#e3e7e3"/>
  <rect x="500" y="200" width="100" height="70" rx="6" fill="#e3e7e3"/>
  <!-- pin -->
  <g transform="translate(150 150)">
    <path d="M0 -34 C 20 -34 34 -20 34 0 C 34 24 0 44 0 44 C 0 44 -34 24 -34 0 C -34 -20 -20 -34 0 -34 Z" fill="#e2453d"/>
    <circle cx="0" cy="0" r="11" fill="#ffffff"/>
  </g>
  <rect x="40" y="170" width="160" height="44" rx="8" fill="#ffffff" opacity="0.92"/>
  <text x="120" y="198" font-family="system-ui, sans-serif" font-size="14" fill="#3a4a3c" text-anchor="middle">fennec seoul forest</text>
  <text x="624" y="330" font-family="system-ui, sans-serif" font-size="12" fill="#6b7a6b" text-anchor="end" opacity="0.7">MOCK MAP</text>
</svg>
