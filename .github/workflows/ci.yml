name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  validate-repository:
    name: Validate repository structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check required directories
        run: |
          test -d services
          test -d frontend
          test -d infra
          test -d k8s
          test -d scripts
          test -d docs

      - name: Check service directories
        run: |
          test -d services/reservation-service
          test -d services/event-service
          test -d services/user-service
          test -d services/admin-service

      - name: Check Node.js version file
        run: |
          test -f .nvmrc
          cat .nvmrc
          grep -Eq '^v?22' .nvmrc

      - name: Block Python files in services
        run: |
          if find services -name "*.py" | grep .; then
            echo "Python files are not allowed in services. Use Node.js 22 + Express only."
            exit 1
          fi

  test-services:
    name: Test Node.js services
    runs-on: ubuntu-latest
    needs: validate-repository

    strategy:
      matrix:
        service:
          - reservation-service
          - event-service
          - user-service
          - admin-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Check package files
        working-directory: services/${{ matrix.service }}
        run: |
          test -f package.json
          test -f package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test

  frontend-check:
    name: Check frontend
    runs-on: ubuntu-latest
    needs: validate-repository

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend package files
        working-directory: frontend
        run: |
          test -f package.json
          test -f package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - test-services
      - frontend-check

    strategy:
      matrix:
        service:
          - reservation-service
          - event-service
          - user-service
          - admin-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check Dockerfile
        run: |
          test -f services/${{ matrix.service }}/Dockerfile
          grep -Eq '^FROM node:22|^FROM node:22-' services/${{ matrix.service }}/Dockerfile

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:ci ./services/${{ matrix.service }}
