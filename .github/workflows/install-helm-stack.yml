name: Install Helm Stack (monitoring + fluent-bit)

on:
  # 수동 실행 전용. Terraform apply와 CD 성공 후 실행한다.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  CLUSTER_NAME: t11s-dev-eks
  # 현재 클러스터에 설치된 버전에 통일 (다운그레이드 금지)
  KPS_VERSION: "86.1.1"
  # aws-for-fluent-bit: 0.2.0(2026.02)은 신규라 안정 위해 0.1.35 고정
  FLUENTBIT_VERSION: "0.1.35"
  # Fluent Bit → CloudWatch
  LOG_GROUP: "/eks/t11s-dev/trippop"
  FLUENTBIT_NAMESPACE: "kube-system"
  FLUENTBIT_SA: "aws-for-fluent-bit"

jobs:
  install-helm-stack:
    name: Install kube-prometheus-stack + fluent-bit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community \
            https://prometheus-community.github.io/helm-charts
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

      # ----------------------------------------------------------------
      # CRD를 차트 버전(86.1.1, operator v0.91.0)에 맞춰 먼저 적용.
      #  - kube-prometheus-stack 은 helm upgrade 가 CRD 를 자동 갱신하지 않음.
      #  - CRD 가 옛 버전이면 'hostNetwork / enableOTLPReceiver: field not
      #    declared in schema' 에러로 upgrade 가 실패함.
      #  - --server-side: CRD 가 커서 client-side apply 는 annotation 크기
      #    제한(262144)에 걸림.
      # ----------------------------------------------------------------
      - name: Apply kube-prometheus-stack CRDs (version-matched)
        run: |
          helm show crds prometheus-community/kube-prometheus-stack \
            --version ${{ env.KPS_VERSION }} > /tmp/kps-crds.yaml

          CRD_COUNT=$(grep -c "kind: CustomResourceDefinition" /tmp/kps-crds.yaml || true)
          echo "[INFO] CRD 문서 수: $CRD_COUNT (보통 9~10)"
          if [ "$CRD_COUNT" -lt 8 ]; then
            echo "[ERROR] CRD 추출 실패 (개수 부족). 중단."
            exit 1
          fi

          kubectl apply --server-side --force-conflicts -f /tmp/kps-crds.yaml

          echo "[INFO] 적용 후 Alertmanager CRD operator 버전:"
          kubectl get crd alertmanagers.monitoring.coreos.com \
            -o jsonpath='{.metadata.annotations.controller-gen\.kubebuilder\.io/version}'
          echo ""

      - name: Create monitoring namespace
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml \
            | kubectl apply -f -
          kubectl apply -f k8s/base/namespace.yaml

      # ----------------------------------------------------------------
      # gp3 기본 StorageClass.
      #  - monitoring-values.yaml 의 prometheus/alertmanager/grafana PVC가
      #    storageClassName: gp3 을 참조하므로 helm install 전에 존재해야 함.
      #  - aws-ebs-csi-driver addon(terraform eks-addons) 선행 필요.
      #  - EKS 기본 default(gp2)의 default 표시를 해제해 default 2개 충돌 방지.
      # ----------------------------------------------------------------
      - name: Apply gp3 StorageClass (default)
        run: |
          kubectl apply -f k8s/storageclass-gp3.yaml
          kubectl patch storageclass gp2 \
            -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}' \
            2>/dev/null || echo "[INFO] gp2 StorageClass 없음 — 스킵"

      - name: Create Alertmanager Slack webhook Secret
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -z "$SLACK_URL" ]]; then
            echo "[WARN] SLACK_WEBHOOK_URL secret 없음. placeholder로 설치."
            SLACK_URL="https://hooks.slack.com/services/PLACEHOLDER"
          fi
          kubectl create secret generic alertmanager-slack-webhook \
            --namespace monitoring \
            --from-literal=url="$SLACK_URL" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "[INFO] alertmanager-slack-webhook Secret 적용 완료"

      # 레거시 모델 JSON을 grafana_dashboard=1 라벨 ConfigMap으로 감싼다.
      # Grafana sidecar가 이 라벨을 감지해 자동 임포트하므로 별도 API import는 없다.
      - name: Apply Grafana dashboards
        run: |
          kubectl apply -k k8s/base/grafana-dashboards
          kubectl get configmap \
            -n trippop \
            -l grafana_dashboard=1 \
            --show-labels
          COUNT=$(kubectl get configmap \
            -n trippop \
            -l grafana_dashboard=1 \
            -o jsonpath='{.items[*].metadata.name}' | wc -w)
          if [[ "$COUNT" -lt 1 ]]; then
            echo "[ERROR] grafana_dashboard=1 ConfigMap을 찾지 못함"
            exit 1
          fi
          echo "[INFO] Grafana dashboard ConfigMap 적용 완료 (개수: $COUNT)"

      # ----------------------------------------------------------------
      # install / upgrade 분기.
      #  - upgrade 에서 --reuse-values 제거: 이게 있으면 monitoring-values.yaml
      #    의 변경(예: Slack 템플릿 시간대 수정)이 조용히 무시됨.
      #  - 항상 --values 로 전체 values 를 명시한다.
      #  - CRD는 이전 pending-install 단계에서 이미 생성될 수 있으므로,
      #    필수 CRD 존재를 먼저 확인하고 Helm 본 설치에서는 재처리하지 않는다.
      # ----------------------------------------------------------------
      - name: Verify kube-prometheus-stack CRDs
        run: |
          set -euo pipefail

          REQUIRED_CRDS=(
            alertmanagers.monitoring.coreos.com
            prometheuses.monitoring.coreos.com
            prometheusrules.monitoring.coreos.com
            servicemonitors.monitoring.coreos.com
          )

          for crd in "${REQUIRED_CRDS[@]}"; do
            kubectl get crd "$crd" >/dev/null
          done

          echo "[INFO] kube-prometheus-stack 필수 CRD 확인 완료"

      - name: Install or upgrade kube-prometheus-stack
        timeout-minutes: 20
        run: |
          set -euo pipefail

          STATUS_OUTPUT=$(helm status kube-prometheus-stack \
            --namespace monitoring \
            -o json 2>&1) && STATUS_RC=0 || STATUS_RC=$?

          if [[ "$STATUS_RC" -eq 0 ]]; then
            RELEASE_STATUS=$(printf '%s' "$STATUS_OUTPUT" | jq -r '.info.status // "unknown"')
          elif [[ "$STATUS_OUTPUT" == *"not found"* || "$STATUS_OUTPUT" == *"release: not found"* ]]; then
            RELEASE_STATUS="not-found"
          else
            echo "$STATUS_OUTPUT"
            exit "$STATUS_RC"
          fi

          echo "[INFO] kube-prometheus-stack release status: $RELEASE_STATUS"

          if [[ "$RELEASE_STATUS" == pending-* ]]; then
            echo "[WARN] 이전 Helm 작업이 $RELEASE_STATUS 상태로 남아 있어 release lock 정리"
            helm uninstall kube-prometheus-stack \
              --namespace monitoring \
              --timeout 5m \
              --wait || true
            RELEASE_STATUS="not-found"
          fi

          if [[ "$RELEASE_STATUS" == "deployed" || "$RELEASE_STATUS" == "failed" ]]; then
            echo "[INFO] 기존 release 감지 → upgrade (reuse-values 미사용)"
            helm upgrade kube-prometheus-stack \
              prometheus-community/kube-prometheus-stack \
              --namespace monitoring \
              --version ${{ env.KPS_VERSION }} \
              --values helm/monitoring-values.yaml \
              --skip-crds \
              --timeout 10m \
              --atomic \
              --cleanup-on-fail \
              --wait
          else
            echo "[INFO] 신규 설치 → install"
            helm install kube-prometheus-stack \
              prometheus-community/kube-prometheus-stack \
              --namespace monitoring \
              --version ${{ env.KPS_VERSION }} \
              --values helm/monitoring-values.yaml \
              --skip-crds \
              --timeout 10m \
              --atomic \
              --wait
          fi

      # 대시보드는 위 grafana_dashboard=1 ConfigMap을 sidecar가 자동 로드한다.
      # (예전의 API import 단계는 제거됨 — 파드 재시작/재구축 시 자동 복구되지 않았음)

      - name: Apply ServiceMonitor and PrometheusRule
        run: |
          kubectl apply -f k8s/base/servicemonitor.yaml
          echo "[INFO] ServiceMonitor 적용 완료"

          kubectl apply -f k8s/base/prometheusrules.yaml
          echo "[INFO] PrometheusRule 적용 완료"

          # 옛 default ns 룰 정리
          kubectl delete prometheusrule kculture-must-rules \
            -n default --ignore-not-found

      # ----------------------------------------------------------------
      # Fluent Bit → CloudWatch Logs (DaemonSet)
      #  - 앱이 이미 JSON 구조화 stdout 로그를 내므로 앱 수정 불필요.
      #  - IRSA Role(ARN)은 별도 1회 생성해 GitHub Secret 으로 주입.
      #    (클러스터를 destroy 해도 IAM Role 은 살아있어 재구축 시 재사용)
      #  - CloudWatch Log Group 은 autoCreateGroup=true 로 차트가 생성.
      # ----------------------------------------------------------------
      - name: Install or upgrade aws-for-fluent-bit
        env:
          FLUENTBIT_ROLE_ARN: ${{ secrets.FLUENTBIT_ROLE_ARN }}
        run: |
          if [[ -z "$FLUENTBIT_ROLE_ARN" ]]; then
            echo "[ERROR] FLUENTBIT_ROLE_ARN secret 없음."
            echo "        IRSA Role 을 먼저 생성하고 GitHub Secret 에 등록하세요."
            echo "        (가이드 5단계 참고)"
            exit 1
          fi

          helm upgrade --install aws-for-fluent-bit eks/aws-for-fluent-bit \
            --namespace ${{ env.FLUENTBIT_NAMESPACE }} \
            --version ${{ env.FLUENTBIT_VERSION }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=${{ env.FLUENTBIT_SA }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="$FLUENTBIT_ROLE_ARN" \
            --set cloudWatchLogs.enabled=true \
            --set cloudWatchLogs.region=${{ env.AWS_REGION }} \
            --set cloudWatchLogs.logGroupName=${{ env.LOG_GROUP }} \
            --set cloudWatchLogs.logStreamPrefix=fluentbit- \
            --set cloudWatchLogs.autoCreateGroup=true \
            --set resources.requests.cpu=5m \
            --set resources.requests.memory=50Mi \
            --set resources.limits.memory=250Mi \
            --set cloudWatch.enabled=false \
            --set firehose.enabled=false \
            --set kinesis.enabled=false \
            --set elasticsearch.enabled=false \
            --timeout 10m \
            --wait
          echo "[INFO] aws-for-fluent-bit 적용 완료"

      - name: Verify
        run: |
          echo "=== Helm 설치 상태 ==="
          helm list -A

          echo ""
          echo "=== monitoring Pod 상태 ==="
          kubectl get pods -n monitoring

          echo ""
          echo "=== Grafana sidecar 확인 ==="
          kubectl get pod -n monitoring \
            -l app.kubernetes.io/name=grafana \
            -o jsonpath='{.items[0].spec.containers[*].name}' \
            && echo ""

          echo ""
          echo "=== Grafana dashboard ConfigMap 확인 ==="
          kubectl get configmap -A -l grafana_dashboard=1

          echo ""
          echo "=== PrometheusRule 확인 ==="
          kubectl get prometheusrule -n monitoring

          echo ""
          echo "=== ServiceMonitor 확인 ==="
          kubectl get servicemonitor -n trippop

          echo ""
          echo "=== Fluent Bit DaemonSet Pod 상태 ==="
          kubectl get pods -n ${{ env.FLUENTBIT_NAMESPACE }} \
            -l app.kubernetes.io/name=aws-for-fluent-bit

          echo ""
          echo "=== Fluent Bit 로그 (AccessDenied 등 에러 확인) ==="
          kubectl logs -n ${{ env.FLUENTBIT_NAMESPACE }} \
            -l app.kubernetes.io/name=aws-for-fluent-bit --tail=20 \
            | grep -iE "error|denied|fail" || echo "에러 없음 ✓"
