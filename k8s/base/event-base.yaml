apiVersion: v1
kind: Service
metadata:
  name: event-svc
  namespace: trippop
  labels:
    app: event
spec:
  selector:
    app: event
  ports:
    - name: http
      protocol: TCP
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-api
  namespace: trippop
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: event
  template:
    metadata:
      labels:
        app: event
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: event
      containers:
      - name: event-app
        image: ECR_REGISTRY_PLACEHOLDER/t11s-dev-ecr-event-service
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        envFrom:
        - configMapRef:
            name: kculture-config
        - secretRef:
            name: kculture-db-secrets
        ports:
        - containerPort: 3002
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3002
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3002
        startupProbe:
          httpGet:
            path: /health/live
            port: 3002
          failureThreshold: 30
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 30"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: event-pdb
  namespace: trippop
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: event
