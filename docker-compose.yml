    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    profiles: ["local"] # íë¼í¼ ìëí ë° ë¡ì»¬ ì¤í ì ëªìì  í¸ì¶
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # í¸ì¤í¸ 3306 ì´ ì´ë¯¸ ì¬ì© ì¤ì´ë©´ DB_HOST_PORT ë¡ ë³ê²½ (ì»¨íì´ë ê° íµì ì ìí¥ ìì)
    ports: ["${DB_HOST_PORT:-3306}:3306"]
    volumes:
      # EBS ë§ì´í¸ ê²½ë¡(/mnt/production_db_data) ë´ë¶ë ë¡ì»¬ íë¡ì í¸ ë´ë¶ìì ë°ì´í° ì ì§ë¥¼ ìí ë°ì¸ë©
      - ./mysql_data:/var/lib/mysql
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql
