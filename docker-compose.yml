      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_CONN_LIMIT=${DB_CONN_LIMIT}
      - AWS_REGION=${AWS_REGION}

