      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    # depends_on ì ê±° (Admin EC2 íê²½ ë°°ë ¤)

  reservation-service:
    build: ./services/reservation-service
    ports: ["3001:3001"]
    environment:
      - DB_HOST=${DB_HOST:-mariadb-server}
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_CONN_LIMIT=${DB_CONN_LIMIT}
      - AWS_REGION=${AWS_REGION}

